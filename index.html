<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>心动合成：电眼女王</title>
  <meta name="description" content="二合一合成 + 恋爱推图模拟游戏，合成物品征服校园男神！">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div id="game-container">

    <!-- ===== TOP: Boss Area ===== -->
    <div class="boss-area">
      <div id="boss-portrait">
        <span>⌛</span>
        <div id="boss-blush"></div>
      </div>
      <div class="boss-info">
        <div id="boss-name">Loading...</div>
        <div id="boss-title">...</div>
        <div class="hp-bar-container">
          <div id="hp-bar-fill"></div>
          <span id="hp-text"></span>
        </div>
      </div>
    </div>

    <!-- ===== ORDER PANEL ===== -->
    <div class="order-panel" id="order-panel">
      <div class="order-header">
        <div id="order-name">📋 Loading...</div>
        <div id="order-timer">⏱️ ...</div>
      </div>
      <div class="order-items" id="order-items">
        <!-- filled by JS -->
      </div>
      <button id="submit-order-btn" disabled>💝 提交物品</button>
    </div>

    <!-- ===== GAME GRID ===== -->
    <div class="grid-container">
      <div id="game-grid">
        <!-- 7x9 cells generated by JS -->
      </div>
    </div>

    <!-- ===== BOTTOM BAR ===== -->
    <div class="bottom-bar">
      <div class="generators-row">
        <button class="gen-btn" id="gen-a-btn">
          <span class="gen-emoji">...</span>
          <div class="gen-label">
            <span class="gen-name">Loading...</span>
            <span class="gen-cost">⚡ -1</span>
          </div>
        </button>
        <button class="gen-btn" id="gen-b-btn">
          <span class="gen-emoji">...</span>
          <div class="gen-label">
            <span class="gen-name">Loading...</span>
            <span class="gen-cost">⚡ -1</span>
          </div>
        </button>
      </div>
      <div class="status-row">
        <div id="energy-bar">
          <div id="energy-bar-fill"></div>
          <span id="energy-text">⚡ 100/100</span>
        </div>
        <div id="gold-text">🪙 0</div>
      </div>
    </div>

  </div>

  <!-- ===== DIALOGUE OVERLAY ===== -->
  <div id="dialogue-overlay">
    <div class="dialogue-box">
      <div id="dialogue-portrait"></div>
      <div id="dialogue-npc-name"></div>
      <div id="dialogue-npc-text"></div>
      <div id="dialogue-player-text"></div>
      <button id="dialogue-close-btn">继续 ▸</button>
    </div>
  </div>

  <!-- ===== GAME COMPLETE OVERLAY ===== -->
  <div id="game-complete-overlay">
    <div class="complete-emoji"></div>
    <div class="complete-title"></div>
    <div class="complete-subtitle"></div>
    <button class="restart-btn" onclick="location.reload()"></button>
  </div>

  <!-- ===== PARTICLE LAYER ===== -->
  <div id="particle-layer"></div>

  <!-- ===== TRANSITION OVERLAY ===== -->
  <div id="transition-overlay"></div>

  <!-- ===== SCRIPTS ===== -->
  <script src="js/config.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/energy.js"></script>
  <script src="js/dialogue.js"></script>
  <script src="js/board.js"></script>
  <script src="js/boss.js"></script>
  <script src="js/main.js"></script>

</body>

</html>
