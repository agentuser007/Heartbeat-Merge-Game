<!doctype html>
<html lang="zh-CN">
  <head>
    <!-- Google tag (gtag.js) -->
    <meta charset="UTF-8" />
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-FMJ6X66Z42"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-FMJ6X66Z42");
    </script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title data-i18n="gameTitle">心动合成：电眼女王</title>
    <meta
      name="description"
      content=""
      data-i18n-attr="content:gameDescription"
    />
    <!-- Async Google Fonts: non-blocking load with Chinese fallback fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&display=swap"
    /></noscript>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body
    oncontextmenu="return false;"
    ondragstart="return false;"
    onselectstart="return false"
  >
    <!-- ===== LOADING OVERLAY ===== -->
    <div id="loading-overlay">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading...</div>
    </div>

    <div id="landscape-warning">
      <div class="rotate-icon">&#x1F4F1;</div>
      <div class="rotate-text" data-i18n="landscape.warning">
        请旋转回竖屏模式以获得最佳体验
      </div>
    </div>
    <!-- ===== LANGUAGE SELECTION OVERLAY ===== -->
    <div id="lang-select-overlay">
      <div class="lang-select-card">
        <div class="lang-select-title">选择语言 / Select Language</div>
        <button class="lang-select-btn" data-locale="zh-CN">🇨🇳 中文</button>
        <button class="lang-select-btn" data-locale="en">🇺🇸 English</button>
      </div>
    </div>

    <div id="game-container">
      <!-- ===== TOP STATUS BAR: Energy + Gold + Diamond + Loop ===== -->
      <div id="top-status-bar">
        <div id="loop-badge" style="display: none"></div>
        <div id="energy-bar">
          <div id="energy-bar-fill"></div>
          <span id="energy-text">100/100</span>
        </div>
        <button
          id="reward-energy-btn"
          class="reward-btn reward-btn-energy"
        ></button>
        <div id="gold-text">💰 0</div>
        <div id="diamond-text">💎 0</div>
        <div
          id="reward-badge"
          style="display: none"
          data-i18n="loop.rewardBadge"
        >
          奖励 x1.0
        </div>
      </div>

      <!-- ===== BOSS HEADER: Portrait + Name + HP ===== -->
      <div id="boss-header">
        <div id="boss-portrait">
          <div id="boss-blush"></div>
        </div>
        <div id="boss-info">
          <div id="boss-header-name">
            <span id="boss-name">Loading...</span>
            <span id="boss-title">...</span>
          </div>
          <div class="hp-bar-container">
            <div id="hp-bar-fill"></div>
            <span id="hp-text"></span>
          </div>
        </div>
      </div>

      <!-- ===== QUEST CAROUSEL: Main Quest + Daily Orders ===== -->
      <div id="quest-carousel">
        <!-- Main Quest Card (items + submit only) -->
        <div id="main-quest-card" class="quest-card">
          <div class="main-quest-icon">💎</div>
          <div class="quest-card-body">
            <div class="quest-card-items" id="order-items">
              <!-- filled by JS -->
            </div>
            <button
              id="submit-order-btn"
              disabled
              data-i18n="boss.submitOrder"
            ></button>
          </div>
        </div>

        <!-- Daily Order Cards inserted directly here by JS (no wrapper, avoids display:contents) -->
      </div>

      <!-- ===== GAME GRID with SIDE RECYCLE BINS ===== -->
      <div class="grid-container">
        <div id="recycle-bin-left" class="side-recycle-bin">
          <span class="recycle-icon">♻️</span>
          <span class="recycle-label" data-i18n="nav.recycle">回收</span>
        </div>
        <div id="game-grid">
          <!-- 7x9 cells generated by JS -->
        </div>
        <div id="recycle-bin-right" class="side-recycle-bin">
          <span class="recycle-icon">♻️</span>
          <span class="recycle-label" data-i18n="nav.recycle">回收</span>
        </div>
      </div>

      <!-- ===== BOTTOM NAVIGATION ===== -->
      <nav id="bottom-nav">
        <button class="nav-item" data-tab="inventory">
          <span class="nav-icon">🎒</span>
          <span class="nav-label" data-i18n="nav.inventory">背包</span>
          <span id="inventory-badge" class="nav-badge" style="display: none"
            >0</span
          >
        </button>
        <button class="nav-item" data-tab="heroine">
          <span class="nav-icon">👑</span>
          <span class="nav-label" data-i18n="nav.heroine">养成</span>
        </button>
        <button class="nav-item" data-tab="gacha">
          <span class="nav-icon">🎁</span>
          <span class="nav-label" data-i18n="nav.gacha">扭蛋</span>
        </button>
        <button class="nav-item" data-tab="collection">
          <span class="nav-icon">📖</span>
          <span class="nav-label" data-i18n="nav.collection">图鉴</span>
        </button>
        <button class="nav-item" data-tab="achievement">
          <span class="nav-icon">🏆</span>
          <span class="nav-label" data-i18n="nav.achievement">成就</span>
          <span id="achievement-badge" class="nav-badge" style="display: none"
            >0</span
          >
        </button>
      </nav>
    </div>

    <!-- ===== DIALOGUE OVERLAY ===== -->
    <div id="dialogue-overlay">
      <div class="dialogue-box">
        <div id="dialogue-portrait"></div>
        <div id="dialogue-npc-name"></div>
        <div id="dialogue-npc-text"></div>
        <div id="dialogue-player-text"></div>
        <button
          id="dialogue-skip-btn"
          style="display: none"
          data-i18n="dialogueSkip"
        >
          ⏩ 跳过
        </button>
        <button
          id="dialogue-close-btn"
          data-i18n="dialogue.tapContinue"
        ></button>
      </div>
    </div>

    <!-- ===== PARADE OVERLAY (Queen's Parade) ===== -->
    <div id="parade-overlay">
      <canvas id="sparkle-canvas"></canvas>
      <div class="spotlight spotlight-left"></div>
      <div class="spotlight spotlight-right"></div>
      <div class="red-carpet"></div>
      <div class="carpet-sparkle"></div>
      <div class="parade-title">
        <div class="parade-title-sub" data-i18n="parade.congrats"></div>
        <div class="parade-title-main" data-i18n="parade.title"></div>
      </div>
      <div class="parade-scene">
        <div class="throne">
          <div class="throne-glow"></div>
          <div class="throne-back" data-emoji="throne"></div>
          <div class="throne-seat"></div>
          <div class="queen-on-throne">
            <div class="queen-crown" data-emoji="crown"></div>
            <div
              class="queen-avatar-parade"
              style="
                background-image: url(&quot;assets/avatar/heroine.webp&quot;);
              "
            ></div>
          </div>
        </div>
        <div class="carriers">
          <div class="carrier carrier-1">
            <div class="carrier-pole carrier-pole-left"></div>
            <div
              class="carrier-avatar"
              style="
                background-image: url(&quot;assets/avatar/vincent.webp&quot;);
              "
            ></div>
            <div class="carrier-speech" data-i18n="parade.carrier1Speech"></div>
          </div>
          <div class="carrier carrier-2">
            <div class="carrier-pole carrier-pole-left"></div>
            <div
              class="carrier-avatar"
              style="background-image: url(&quot;assets/avatar/leo.webp&quot;)"
            ></div>
            <div class="carrier-speech" data-i18n="parade.carrier2Speech"></div>
          </div>
          <div class="carrier carrier-3">
            <div class="carrier-pole carrier-pole-right"></div>
            <div
              class="carrier-avatar"
              style="
                background-image: url(&quot;assets/avatar/daniel.webp&quot;);
              "
            ></div>
            <div class="carrier-speech" data-i18n="parade.carrier3Speech"></div>
          </div>
          <div class="carrier carrier-4">
            <div class="carrier-pole carrier-pole-right"></div>
            <div
              class="carrier-avatar"
              style="
                background-image: url(&quot;assets/avatar/morven.webp&quot;);
              "
            ></div>
            <div class="carrier-speech" data-i18n="parade.carrier4Speech"></div>
          </div>
        </div>
      </div>
      <div class="parade-bottom-text" data-i18n="parade.bottomText"></div>
    </div>

    <!-- ===== LOOP SUMMARY OVERLAY ===== -->
    <div id="loop-summary-overlay">
      <div class="loop-summary-card">
        <div class="summary-loop-num" data-i18n="loop.loopComplete">
          第 1 轮 完成
        </div>
        <div class="summary-outro" data-i18n="loop.congratsClear">
          恭喜通关！
        </div>
        <div class="summary-tokens" data-i18n="loop.tokensEarned">
          🏫 +10 学园声望
        </div>
        <div class="summary-token-detail" data-i18n="loop.tokenDetail">
          (基础 10 + 额外 0)
        </div>
        <div class="summary-token-balance" data-i18n="loop.tokenBalance">
          学园声望: 10
        </div>
        <div class="summary-shop-title" data-i18n="loop.shopTitle">
          🏪 学园声望商店
        </div>
        <div class="meta-shop-list">
          <!-- filled by JS -->
        </div>
        <div class="summary-next" data-i18n="loop.nextLoop">
          下一轮: 第 2 轮 · 第二学期
        </div>
        <button class="summary-next-btn" data-i18n="loop.nextBtn">
          进入下一轮 →
        </button>
      </div>
    </div>

    <!-- ===== GAME COMPLETE OVERLAY ===== -->
    <div id="game-complete-overlay">
      <div class="complete-emoji"></div>
      <div class="complete-title"></div>
      <div class="complete-subtitle"></div>
      <button class="restart-btn" onclick="location.reload()"></button>
    </div>

    <!-- ===== PARTICLE LAYER ===== -->
    <div id="particle-layer"></div>

    <!-- ===== TRANSITION OVERLAY ===== -->
    <div id="transition-overlay"></div>

    <!-- ===== UNIFIED TOAST ROOT (z-index above overlays, below blocking modals) ===== -->
    <div id="toast-root"></div>

    <!-- ===== BOTTOM SHEET BACKDROP ===== -->
    <div class="bottom-sheet-backdrop" id="sheet-backdrop"></div>

    <!-- ===== HEROINE BOTTOM SHEET ===== -->
    <div class="bottom-sheet" id="heroine-sheet">
      <div class="sheet-drag-handle"></div>
      <div class="sheet-header">
        <span data-i18n="heroine.panelTitle"></span>
        <button class="sheet-close" data-close="heroine-sheet">✕</button>
      </div>
      <div class="sheet-sub" data-i18n="heroine.panelSub"></div>
      <div id="heroine-upgrade-list" class="sheet-body">
        <!-- filled by JS -->
      </div>
      <!-- ===== SHOP SECTION (inside heroine sheet) ===== -->
      <div class="sheet-section-divider"></div>
      <div class="sheet-header">
        <span data-i18n="heroine.goldShop">🏪 金币商店</span>
      </div>
      <div class="sheet-sub" data-i18n="heroine.shopSub">
        用金币购买实用道具
      </div>
      <div id="shop-list" class="sheet-body">
        <!-- filled by JS -->
      </div>
    </div>

    <!-- ===== DAILY ORDER BOTTOM SHEET ===== -->
    <div class="bottom-sheet" id="daily-sheet">
      <div class="sheet-drag-handle"></div>
      <div class="sheet-header">
        <span data-i18n="dailyOrder.panelTitle"></span>
        <button class="sheet-close" data-close="daily-sheet">✕</button>
      </div>
      <div class="sheet-sub" data-i18n="dailyOrder.panelSub"></div>
      <div id="daily-order-list" class="sheet-body">
        <!-- filled by JS -->
      </div>
    </div>

    <!-- ===== GACHA BOTTOM SHEET ===== -->
    <div class="bottom-sheet" id="gacha-sheet">
      <div class="sheet-drag-handle"></div>
      <div class="sheet-header">
        <span data-i18n="gacha.modalTitle"></span>
        <button class="sheet-close" data-close="gacha-sheet">✕</button>
      </div>
      <div id="gacha-pity-display" class="gacha-pity-area"></div>
      <div id="gacha-result" class="sheet-body">
        <div class="gacha-hint" data-i18n="gacha.hint"></div>
      </div>
      <div class="gacha-buttons">
        <button id="gacha-single" class="gacha-pull-btn"></button>
        <button id="gacha-ten" class="gacha-pull-btn ten"></button>
      </div>
      <div class="gacha-reward-buttons">
        <button
          id="reward-diamond-btn"
          class="reward-btn reward-btn-diamond"
        ></button>
        <button
          id="reward-freepull-btn"
          class="reward-btn reward-btn-freepull"
        ></button>
      </div>
    </div>

    <!-- ===== COLLECTION BOTTOM SHEET ===== -->
    <div class="bottom-sheet" id="collection-sheet">
      <div class="sheet-drag-handle"></div>
      <div class="sheet-header">
        <span data-i18n="collection.panelTitle"></span>
        <button class="sheet-close" data-close="collection-sheet">✕</button>
      </div>
      <!-- Tab Switcher -->
      <div class="collection-tabs">
        <button
          class="collection-tab active"
          data-tab="items"
          data-i18n="collection.tabItems"
        >
          📦 物品图鉴
        </button>
        <button
          class="collection-tab"
          data-tab="gacha"
          data-i18n="collection.tabGacha"
        >
          🎁 卡牌图鉴
        </button>
        <button
          class="collection-tab"
          data-tab="fragments"
          data-i18n="collection.tabFragments"
        >
          🧩 碎片
        </button>
      </div>
      <div class="sheet-sub" id="collection-pct">0/0 (0%)</div>
      <div id="collection-list" class="sheet-body">
        <!-- filled by JS -->
      </div>
      <div id="gacha-collection-list" class="sheet-body" style="display: none">
        <!-- gacha card collection filled by JS -->
      </div>
      <div
        id="fragment-collection-list"
        class="sheet-body"
        style="display: none"
      >
        <!-- SSR fragment collection filled by JS -->
      </div>
    </div>

    <!-- ===== INVENTORY / BACKPACK BOTTOM SHEET ===== -->
    <div class="bottom-sheet" id="inventory-sheet">
      <div class="sheet-drag-handle"></div>
      <div class="sheet-header">
        <span data-i18n="inventory.panelTitle">🎒 背包</span>
        <button class="sheet-close" data-close="inventory-sheet">✕</button>
      </div>
      <div class="sheet-sub" data-i18n="inventory.panelSub">
        点击「使用」来应用道具效果
      </div>
      <div id="inventory-list" class="sheet-body">
        <!-- filled by JS -->
      </div>
    </div>

    <!-- ===== CG ALBUM BOTTOM SHEET ===== -->
    <div class="bottom-sheet" id="cg-album-sheet">
      <div class="sheet-drag-handle"></div>
      <div class="sheet-header">
        <span data-i18n="cg.albumTitle">📖 CG回忆录</span>
        <button class="sheet-close" data-close="cg-album-sheet">✕</button>
      </div>
      <div id="cg-album-content" class="sheet-body"></div>
    </div>

    <!-- ===== ACHIEVEMENT BOTTOM SHEET ===== -->
    <div class="bottom-sheet" id="achievement-sheet">
      <div class="sheet-drag-handle"></div>
      <div class="sheet-header">
        <span data-i18n="achievement.panelTitle"></span>
        <button class="sheet-close" data-close="achievement-sheet">✕</button>
      </div>
      <div class="sheet-sub" data-i18n="achievement.panelSub"></div>
      <div id="achievement-list" class="sheet-body">
        <!-- filled by JS -->
      </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/config.js"></script>

    <script src="js/logic/GachaLogic.js"></script>

    <script src="js/effects.js"></script>
    <script src="js/energy.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/currency.js"></script>
    <script src="js/dialogue.js"></script>
    <script src="js/board.js"></script>
    <script src="js/boss.js"></script>
    <script src="js/daily-orders.js"></script>
    <script src="js/heroine.js"></script>
    <script src="js/collection.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/gacha.js"></script>
    <script src="js/fragment.js"></script>

    <script src="js/main.js"></script>
    <script>
      (function () {
        var l = 0;
        document.addEventListener(
          "touchend",
          function (e) {
            var n = Date.now();
            if (n - l <= 300) e.preventDefault();
            l = n;
          },
          { passive: false },
        );
        document.addEventListener(
          "touchmove",
          function (e) {
            if (e.touches.length > 1) e.preventDefault();
          },
          { passive: false },
        );
        document.addEventListener("gesturestart", function (e) {
          e.preventDefault();
        });
        document.addEventListener("gesturechange", function (e) {
          e.preventDefault();
        });
        document.addEventListener("gestureend", function (e) {
          e.preventDefault();
        });
        document.addEventListener("dblclick", function (e) {
          e.preventDefault();
        });
        document.addEventListener("keydown", function (e) {
          if (
            (e.ctrlKey || e.metaKey) &&
            (e.key === "+" || e.key === "-" || e.key === "=")
          )
            e.preventDefault();
        });
      })();
    </script>
    <script>
      document.addEventListener("visibilitychange", function () {
        document.body.classList.toggle("app-paused", document.hidden);
      });
    </script>
  </body>
</html>
